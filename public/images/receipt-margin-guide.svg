<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" width="240" height="160" aria-hidden="true">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#374151"/>
      <stop offset="100%" style="stop-color:#1f2937"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  <!-- Camera/phone frame -->
  <rect x="8" y="8" width="224" height="144" rx="12" ry="12" fill="none" stroke="#9ca3af" stroke-width="2" stroke-dasharray="4 2"/>
  <!-- Dark surface (background user should see around receipt) -->
  <rect x="24" y="24" width="192" height="112" rx="6" fill="url(#bg)"/>
  <!-- Receipt (white) with visible margin on all sides -->
  <rect x="44" y="40" width="152" height="80" rx="2" fill="#fff" filter="url(#shadow)"/>
  <!-- Receipt lines (stylized) -->
  <line x1="52" y1="52" x2="188" y2="52" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="52" y1="64" x2="160" y2="64" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="52" y1="76" x2="172" y2="76" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="52" y1="92" x2="140" y2="92" stroke="#d1d5db" stroke-width="1.5"/>
  <line x1="52" y1="104" x2="180" y2="104" stroke="#e5e7eb" stroke-width="1"/>
  <!-- Check / Doru indicator -->
  <circle cx="200" cy="128" r="14" fill="#10b981" stroke="#059669" stroke-width="1.5"/>
  <path d="M195 128 l4 4 8 -8" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="120" y="148" text-anchor="middle" font-size="10" fill="#6b7280" font-family="system-ui,sans-serif">Fi_in etraf1nda bo_luk b1rak1n</text>
</svg>
